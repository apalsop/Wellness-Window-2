<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK-AZ // Perspective Window</title>
    <style>
        :root { --accent: #00aaff; --bg: #050505; --card-bg: #111; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        
        #status-bar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; font-family: monospace; font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 20px; opacity: 0.8; }
        h1 { font-size: 4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 15px; color: #fff; margin: 20px 0 40px 0; text-align: center; text-shadow: 0 0 20px rgba(0, 170, 255, 0.5); }
        
        #mixer-panel { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--accent); 
            padding: 15px 40px; 
            border-radius: 50px; 
            display: flex; 
            gap: 30px; 
            margin-bottom: 30px; 
            backdrop-filter: blur(10px);
        }

        .mixer-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; transition: 0.4s; }
        .mixer-btn.active { color: var(--accent); text-shadow: 0 0 15px var(--accent); }
        
        #debug-log { font-family: monospace; font-size: 0.75rem; color: var(--accent); margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 5px; min-width: 300px; text-align: center; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; }
        .window-card { background: var(--card-bg); border: 1px solid #222; border-radius: 15px; height: 180px; display: flex; align-items: center; justify-content: center; opacity: 0.5; }
        .footer-sig { margin-top: 80px; font-family: monospace; color: var(--accent); letter-spacing: 8px; opacity: 0.4; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="status-bar">
        <span>SYSTEM: ONLINE</span>
        <span id="clock">00:00:00</span>
        <span>ARK-AZ // BUILD 2.2</span>
    </div>

    <h1>WELLNESS WINDOW</h1>

    <div id="mixer-panel">
        <button class="mixer-btn" id="btn-rain" onclick="playEngine('rain')">Rain</button>
        <button class="mixer-btn" id="btn-waves" onclick="playEngine('waves')">Waves</button>
        <button class="mixer-btn" id="btn-forest" onclick="playEngine('forest')">Forest</button>
        <button class="mixer-btn" id="btn-lofi" onclick="playEngine('lofi')">Lo-Fi</button>
        <button class="mixer-btn" style="color:#ff4444;" onclick="stopEngine()">OFF</button>
    </div>

    <div id="debug-log">SYSTEM READY // STANDBY</div>

    <div class="grid">
        <div class="window-card">READY FOR YOUTUBE</div>
        <div class="window-card">READY FOR YOUTUBE</div>
        <div class="window-card">READY FOR YOUTUBE</div>
        <div class="window-card">READY FOR YOUTUBE</div>
    </div>

    <div class="footer-sig">ARC-AZ // PERSPECTIVE</div>

    <audio id="master-player" loop crossorigin="anonymous"></audio>

    <script>
        const player = document.getElementById('master-player');
        const log = (msg) => document.getElementById('debug-log').innerText = "STATUS: " + msg.toUpperCase();

        const library = {
            rain: "https://upload.wikimedia.org/wikipedia/commons/3/34/Rain_on_roof_1.ogg",
            waves: "https://upload.wikimedia.org/wikipedia/commons/b/b2/Ocean_waves_crashing_on_the_beach.ogg",
            forest: "https://upload.wikimedia.org/wikipedia/commons/0/05/Bird_Ambience.ogg",
            lofi: "https://stream.zeno.fm/0r0xa792kwzuv"
        };

        let currentId = null;

        async function playEngine(id) {
            // If clicking the same button, stop it
            if (currentId === id) {
                stopEngine();
                return;
            }

            // UI Reset
            document.querySelectorAll('.mixer-btn').forEach(b => b.classList.remove('active'));
            
            log("loading " + id + "...");
            
            try {
                player.src = library[id];
                player.load();
                
                // The Play Promise
                await player.play();
                
                currentId = id;
                document.getElementById('btn-' + id).classList.add('active');
                log("streaming: " + id);
            } catch (err) {
                log("browser blocked autoplay. click page once.");
                console.error(err);
            }
        }

        function stopEngine() {
            player.pause();
            player.src = "";
            currentId = null;
            document.querySelectorAll('.mixer-btn').forEach(b => b.classList.remove('active'));
            log("system standby");
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
