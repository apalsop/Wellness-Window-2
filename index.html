<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK - AZ</title>
    <style>
        :root { --accent: #00aaff; --bg: #050505; --card-bg: #111; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* THE START SCREEN */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #enter-btn {
            padding: 20px 60px; background: none; border: 2px solid var(--accent);
            color: var(--accent); font-size: 1.8rem; letter-spacing: 10px;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        #enter-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 30px var(--accent); }

        /* MAIN UI */
        #main-ui { display: none; padding: 40px 20px; width: 100%; flex-direction: column; align-items: center; }
        #status-bar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; font-family: monospace; font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 20px; opacity: 0.7; }
        
        h1 { font-size: 5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 20px; color: #fff; margin: 20px 0 40px 0; text-align: center; text-shadow: 0 0 20px rgba(0, 170, 255, 0.4); }
        
        #mixer { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--accent); 
            padding: 15px 40px; border-radius: 50px; display: flex; gap: 35px; 
            margin-bottom: 50px; backdrop-filter: blur(10px);
        }

        .btn { background: none; border: none; color: #555; cursor: pointer; font-size: 1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 4px; transition: 0.3s; }
        .btn:hover { color: #fff; }
        .btn.active { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        .sig { margin-top: 100px; font-family: monospace; color: var(--accent); letter-spacing: 10px; opacity: 0.5; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="font-size: 2.5rem; margin-bottom: 50px;">ARK - AZ</h1>
        <button id="enter-btn" onclick="unlockSystem()">Enter</button>
    </div>

    <div id="main-ui">
        <div id="status-bar">
            <span>SYSTEM: ONLINE</span>
            <span id="clock">00:00:00</span>
            <span>BUILD: STABLE</span>
        </div>

        <h1>ARK - AZ</h1>

        <div id="mixer">
            <button class="btn" id="btn-rain" onclick="toggle('rain')">Rain</button>
            <button class="btn" id="btn-waves" onclick="toggle('waves')">Waves</button>
            <button class="btn" id="btn-forest" onclick="toggle('forest')">Forest</button>
            <button class="btn" id="btn-lofi" onclick="toggle('lofi')">Lo-Fi</button>
            <button class="btn" style="color:#ff4444; margin-left: 15px;" onclick="killAll()">OFF</button>
        </div>

        <div class="sig">ARC - AZ</div>
    </div>

    <audio id="aud-rain" loop preload="auto" src="https://cdn.pixabay.com/audio/2022/07/04/audio_32064d1f71.mp3"></audio>
    <audio id="aud-waves" loop preload="auto" src="https://cdn.pixabay.com/audio/2021/08/09/audio_6590f0ca13.mp3"></audio>
    <audio id="aud-forest" loop preload="auto" src="https://cdn.pixabay.com/audio/2022/02/13/audio_82af9d8a39.mp3"></audio>
    <audio id="aud-lofi" loop preload="auto" src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>

    <script>
        const ids = ['rain', 'waves', 'forest', 'lofi'];

        // This function forces the browser to allow all 4 audio tracks at once
        function unlockSystem() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            
            ids.forEach(name => {
                const a = document.getElementById('aud-' + name);
                // We play and immediately pause every track while it's muted. 
                // This "primes" the browser to allow them later.
                a.muted = true;
                a.play().then(() => {
                    a.pause();
                    a.muted = false;
                    a.currentTime = 0;
                }).catch(e => console.log("Priming " + name));
            });
        }

        function toggle(name) {
            const target = document.getElementById('aud-' + name);
            const btn = document.getElementById('btn-' + name);

            // If it's already playing, just turn it off
            if (!target.paused) {
                target.pause();
                btn.classList.remove('active');
                return;
            }

            // Otherwise, turn everything else off first
            killAll();

            // Now play the selected one and turn the button blue
            target.play();
            btn.classList.add('active');
        }

        function killAll() {
            ids.forEach(name => {
                const a = document.getElementById('aud-' + name);
                const b = document.getElementById('btn-' + name);
                a.pause();
                // We only reset the time for MP3s (Rain/Waves/Forest), not the Lo-Fi stream
                if (name !== 'lofi') a.currentTime = 0;
                b.classList.remove('active');
            });
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
