<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Window</title>
    <style>
        :root { --accent: #00aaff; --bg: #050505; --card-bg: #111; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        #status-bar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; font-family: monospace; font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 20px; opacity: 0.7; }
        h1 { font-size: 4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 15px; color: #fff; margin: 20px 0 40px 0; text-align: center; text-shadow: 0 0 20px rgba(0, 170, 255, 0.4); }
        
        #mixer { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--accent); 
            padding: 15px 40px; border-radius: 50px; display: flex; gap: 30px; 
            margin-bottom: 50px; backdrop-filter: blur(10px);
        }
        .btn { background: none; border: none; color: #555; cursor: pointer; font-size: 1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 4px; transition: 0.3s; }
        .btn.active { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        /* 16-TILE GRID PLACEHOLDER */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 100%; max-width: 1200px; }
        .tile { background: var(--card-bg); border: 1px solid #222; aspect-ratio: 16/9; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #444; }

        .tagline { margin-top: 100px; font-family: monospace; color: var(--accent); letter-spacing: 10px; opacity: 0.6; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status-bar">
        <span>SYSTEM: ONLINE</span>
        <span id="clock">00:00:00</span>
        <span>BUILD_2.0_REBOOT</span>
    </div>

    <h1>WELLNESS WINDOW</h1>

    <div id="mixer">
        <button class="btn" id="btn-rain" onclick="toggle('rain')">Rain</button>
        <button class="btn" id="btn-waves" onclick="toggle('waves')">Waves</button>
        <button class="btn" id="btn-forest" onclick="toggle('forest')">Forest</button>
        <button class="btn" id="btn-lofi" onclick="toggle('lofi')">Lo-Fi</button>
        <button class="btn" style="color:#ff4444;" onclick="allOff()">OFF</button>
    </div>

    <div class="grid" id="video-grid">
        </div>

    <div class="tagline">ARK - AZ</div>

    <audio id="aud-rain" loop src="https://actions.google.com/sounds/v1/water/rain_on_roof.ogg"></audio>
    <audio id="aud-waves" loop src="https://actions.google.com/sounds/v1/water/waves_crashing_on_shore.ogg"></audio>
    <audio id="aud-forest" loop src="https://actions.google.com/sounds/v1/ambiences/forest_ambience.ogg"></audio>
    <audio id="aud-lofi" loop src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>

    <script>
        const ids = ['rain', 'waves', 'forest', 'lofi'];

        function toggle(name) {
            const target = document.getElementById('aud-' + name);
            const btn = document.getElementById('btn-' + name);

            if (!target.paused) {
                target.pause();
                btn.classList.remove('active');
                return;
            }

            allOff();
            
            // Try/Catch ensures the button still turns blue even if browser throws a warning
            target.play().then(() => {
                btn.classList.add('active');
            }).catch(e => {
                btn.classList.add('active'); // Turn blue anyway
                alert("Click anywhere on the page first to enable audio!");
            });
        }

        function allOff() {
            ids.forEach(id => {
                const a = document.getElementById('aud-' + id);
                const b = document.getElementById('btn-' + id);
                a.pause();
                b.classList.remove('active');
            });
        }

        // Initialize 16 tiles
        const grid = document.getElementById('video-grid');
        for(let i=1; i<=16; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerText = 'YOUTUBE_SLOT_' + i;
            grid.appendChild(tile);
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
