<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Window</title>
    <style>
        :root { --accent: #00aaff; --bg: #050505; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* THE ENTER OVERLAY */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #enter-btn {
            padding: 20px 60px; background: none; border: 2px solid var(--accent);
            color: var(--accent); font-size: 1.8rem; letter-spacing: 10px;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        #enter-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 30px var(--accent); }

        /* MAIN APP LAYER */
        #main-ui { display: none; padding: 40px 20px; width: 100%; flex-direction: column; align-items: center; }
        #status-bar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; font-family: monospace; font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 20px; opacity: 0.7; }
        
        h1 { font-size: 4.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 15px; color: #fff; margin: 20px 0 40px 0; text-align: center; text-shadow: 0 0 20px rgba(0, 170, 255, 0.4); }
        
        #mixer { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--accent); 
            padding: 15px 40px; border-radius: 50px; display: flex; gap: 35px; 
            margin-bottom: 50px; backdrop-filter: blur(10px);
        }

        .btn { background: none; border: none; color: #555; cursor: pointer; font-size: 1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 4px; transition: 0.3s; }
        .btn:hover { color: #fff; }
        .btn.active { color: var(--accent); text-shadow: 0 0 15px var(--accent); }

        .tagline { margin-top: auto; padding-bottom: 50px; font-family: monospace; color: var(--accent); letter-spacing: 10px; opacity: 0.6; font-size: 0.9rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="font-size: 2.5rem; margin-bottom: 50px;">WELLNESS WINDOW</h1>
        <button id="enter-btn" onclick="openWindow()">Enter</button>
    </div>

    <div id="main-ui">
        <div id="status-bar">
            <span>SYSTEM: ONLINE</span>
            <span id="clock">00:00:00</span>
            <span>BUILD_3.3_UNIFIED</span>
        </div>

        <h1>WELLNESS WINDOW</h1>

        <div id="mixer">
            <button class="btn" id="btn-rain" onclick="playStream('rain', 'https://stream.zeno.fm/032u683f83duv')">Rain</button>
            <button class="btn" id="btn-waves" onclick="playStream('waves', 'https://stream.zeno.fm/4v6v798n0zhvv')">Waves</button>
            <button class="btn" id="btn-forest" onclick="playStream('forest', 'https://stream.zeno.fm/65k793ykwzuv')">Forest</button>
            <button class="btn" id="btn-lofi" onclick="playStream('lofi', 'https://stream.zeno.fm/0r0xa792kwzuv')">Lo-Fi</button>
            <button class="btn" style="color:#ff4444;" onclick="killAudio()">OFF</button>
        </div>

        <div class="tagline">ARK - AZ</div>
    </div>

    <audio id="master-player" crossorigin="anonymous"></audio>

    <script>
        const player = document.getElementById('master-player');
        let currentActiveId = null;

        function openWindow() {
            document.getElementById('splash').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
        }

        function playStream(id, url) {
            // If clicking the one that is already playing, turn it off
            if (currentActiveId === id) {
                killAudio();
                return;
            }

            // Clear old UI
            killAudio();

            // Set new stream and play
            player.src = url;
            player.play();
            
            // Update UI
            currentActiveId = id;
            document.getElementById('btn-' + id).classList.add('active');
            
            // Sync with browser media center
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: 'Wellness Window',
                    artist: id.toUpperCase(),
                    album: 'ARK - AZ'
                });
            }
        }

        function killAudio() {
            player.pause();
            player.src = "";
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            currentActiveId = null;
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
