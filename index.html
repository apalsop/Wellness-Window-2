<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Window</title>
    <style>
        :root { --accent: #00aaff; --bg: #050505; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* THE ENTER PAGE */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #enter-btn {
            padding: 25px 80px; background: none; border: 3px solid var(--accent);
            color: var(--accent); font-size: 2rem; letter-spacing: 12px;
            cursor: pointer; text-transform: uppercase; transition: 0.4s;
            box-shadow: 0 0 20px rgba(0, 170, 255, 0.1);
        }
        #enter-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 50px var(--accent); }

        /* MAIN APP LAYER */
        #main-ui { visibility: hidden; opacity: 0; padding: 40px 20px; width: 100%; flex-direction: column; align-items: center; transition: opacity 1s; display: flex; }
        #status-bar { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; font-family: monospace; font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 20px; opacity: 0.6; }
        
        h1 { font-size: clamp(2.5rem, 10vw, 5rem); font-weight: 900; text-transform: uppercase; letter-spacing: 15px; color: #fff; margin: 20px 0 40px 0; text-align: center; text-shadow: 0 0 30px rgba(0, 170, 255, 0.5); }
        
        #mixer { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--accent); 
            padding: 20px 50px; border-radius: 100px; display: flex; gap: 40px; 
            margin-bottom: 60px; backdrop-filter: blur(15px);
        }

        .btn { background: none; border: none; color: #444; cursor: pointer; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; transition: 0.3s; }
        .btn:hover { color: #fff; }
        .btn.active { color: var(--accent); text-shadow: 0 0 20px var(--accent); }

        .tagline { margin-top: auto; padding-bottom: 60px; font-family: monospace; color: var(--accent); letter-spacing: 12px; opacity: 0.7; font-size: 1rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash">
        <h1 style="font-size: 2.5rem; margin-bottom: 60px;">WELLNESS WINDOW</h1>
        <button id="enter-btn" onclick="masterUnlock()">Enter</button>
        <p style="margin-top: 30px; color: #333; font-family: monospace; letter-spacing: 2px;">CLICK TO UNLOCK ALL AUDIO CHANNELS</p>
    </div>

    <div id="main-ui">
        <div id="status-bar">
            <span>SYSTEM: ONLINE</span>
            <span id="clock">00:00:00</span>
            <span>BUILD_4.0_MASTER_KEY</span>
        </div>

        <h1>WELLNESS WINDOW</h1>

        <div id="mixer">
            <button class="btn" id="btn-rain" onclick="control('rain')">Rain</button>
            <button class="btn" id="btn-waves" onclick="control('waves')">Waves</button>
            <button class="btn" id="btn-forest" onclick="control('forest')">Forest</button>
            <button class="btn" id="btn-lofi" onclick="control('lofi')">Lo-Fi</button>
            <button class="btn" style="color:#ff4444; margin-left: 20px;" onclick="killAll()">OFF</button>
        </div>

        <div class="tagline">ARK - AZ</div>
    </div>

    <audio id="aud-rain" loop src="https://actions.google.com/sounds/v1/water/rain_on_roof.ogg" preload="auto"></audio>
    <audio id="aud-waves" loop src="https://actions.google.com/sounds/v1/water/waves_crashing_on_shore.ogg" preload="auto"></audio>
    <audio id="aud-forest" loop src="https://actions.google.com/sounds/v1/ambiences/forest_ambience.ogg" preload="auto"></audio>
    <audio id="aud-lofi" loop src="https://stream.zeno.fm/0r0xa792kwzuv" preload="auto"></audio>

    <script>
        const sounds = ['rain', 'waves', 'forest', 'lofi'];

        function masterUnlock() {
            // 1. Reveal UI
            document.getElementById('splash').style.display = 'none';
            const ui = document.getElementById('main-ui');
            ui.style.visibility = 'visible';
            ui.style.opacity = '1';

            // 2. THE MASTER KEY: Play and Pause EVERY sound immediately
            // This satisfies the browser's "User Gesture" requirement for the whole session
            sounds.forEach(id => {
                const a = document.getElementById('aud-' + id);
                a.play().then(() => {
                    a.pause();
                    a.currentTime = 0;
                }).catch(e => console.log("Unlocking " + id));
            });
        }

        function control(id) {
            const target = document.getElementById('aud-' + id);
            const btn = document.getElementById('btn-' + id);

            if (!target.paused) {
                target.pause();
                btn.classList.remove('active');
                return;
            }

            killAll();

            // Direct play - should now work because of the Master Key unlock
            target.play();
            btn.classList.add('active');
        }

        function killAll() {
            sounds.forEach(id => {
                const a = document.getElementById('aud-' + id);
                const b = document.getElementById('btn-' + id);
                a.pause();
                if (id !== 'lofi') a.currentTime = 0;
                b.classList.remove('active');
            });
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
